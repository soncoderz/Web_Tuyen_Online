<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Web Tuyen Online'">Web Tuyen Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light">
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
            <div class="container">
                <a class="navbar-brand fw-bold" th:href="@{/}">Góc Truyện</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang chủ</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/truyen}">Truyện mới</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/truyen}">Truyện hot</a></li>
                    </ul>
                    <form class="d-flex search-box" role="search" th:action="@{/truyen}" method="get">
                        <input class="form-control me-2 form-dark" type="search" placeholder="Tìm truyện..." name="q">
                        <button class="btn btn-outline-primary" type="submit">Tìm</button>
                    </form>
                    <ul class="navbar-nav ms-3">
                        <li class="nav-item" th:if="${session.token == null}">
                            <a class="nav-link" th:href="@{/login}">Đăng nhập</a>
                        </li>
                        <li class="nav-item" th:if="${session.token == null}">
                            <a class="nav-link" th:href="@{/register}">Đăng ký</a>
                        </li>
                        <li class="nav-item" th:if="${session.token != null}">
                            <a class="nav-link" th:href="@{/dashboard}">Bảng điều khiển</a>
                        </li>
                        <li class="nav-item" th:if="${session.token != null}">
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="nav-link btn btn-link">Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div th:fragment="footer" class="container mt-5">
        <footer class="py-4 my-5 border-top border-secondary">
            <p class="text-center text-secondary">&copy; 2026 Web Tuyen Online</p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
