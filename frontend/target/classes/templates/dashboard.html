<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body class="bg-dark text-light">
    <div th:replace="~{layout :: navbar}"></div>

    <div class="container mt-4">
        <div class="hero mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <div class="hero-title">Xin chào, <span th:text="${session.username}">User</span></div>
                    <div class="hero-subtitle">Khám phá nội dung nổi bật hôm nay</div>
                </div>
                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                    <a th:href="@{/email-test}" class="btn btn-outline-primary">Kiểm tra Email</a>
                </div>
            </div>
        </div>

        <ul class="nav nav-pills category-tabs mb-4">
            <li class="nav-item"><a class="nav-link active" href="#">Mới cập nhật</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Phổ biến</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Yêu thích</a></li>
            <li class="nav-item" th:if="${#lists.contains(session.roles, 'ROLE_ADMIN')}"><a class="nav-link" href="#">Quản trị</a></li>
        </ul>

        <div class="row g-3">
            <div class="col-6 col-md-3" th:each="i : ${#numbers.sequence(1,12)}">
                <div class="grid-card">
                    <div class="thumb">
                        <img th:src="@{'https://picsum.photos/seed/' + ${i} + '/480/640'}" alt="thumb">
                        <div class="overlay">
                            <p class="title">Nội dung #<span th:text="${i}">1</span></p>
                            <p class="meta">Cập nhật hôm nay</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <div class="section-title mb-3">Đề xuất cho bạn</div>
            <div class="row g-3">
                <div class="col-6 col-md-3" th:each="i : ${#numbers.sequence(13,20)}">
                    <div class="grid-card">
                        <div class="thumb">
                            <img th:src="@{'https://picsum.photos/seed/' + ${i} + '/480/640'}" alt="thumb">
                            <div class="overlay">
                                <p class="title">Gợi ý #<span th:text="${i}">13</span></p>
                                <p class="meta">Xu hướng</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
